# macOS DMG/ZIP packaging. Renderer lives in ./dist from Vite; artifacts go to ./release (avoid wiping dist).
appId: com.nicocrisafulli.fridge
productName: Fridge
copyright: Copyright © 2026 Nico Crisafulli
artifactName: Fridge.${ext}

afterPack: scripts/electron-after-pack.cjs

directories:
  output: release
  buildResources: buildResources

mac:
  category: public.app-category.food-and-drink
  icon: build/icon.icns
  identity: NICHOLAS FREEDOM CRISAFULLI (KB8N3Q3ZAF)
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: buildResources/entitlements.mac.plist
  entitlementsInherit: buildResources/entitlements.mac.plist
  target:
    - target: zip
      arch: universal
  notarize:
    teamId: KB8N3Q3ZAF

dmg:
  sign: false
  title: Fridge
  background: build/dmg-background.png
  format: UDZO
  writeUpdateInfo: false
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 200
    - x: 400
      y: 200
      type: link
      path: /Applications
  iconSize: 96
  iconTextSize: 12

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/sql.js/**/*
  - package.json
  - '!**/*.map'
  - '!**/*.ts'

asarUnpack:
  - '**/*.node'
  - '**/node_modules/better-sqlite3/**'
  - node_modules/sql.js/dist/**

extraResources:
  # Dock / window raster icons (electron/main.ts → process.resourcesPath/build)
  - from: build
    to: build
  - from: assets/recipes.db
    to: assets/recipes.db
  - from: assets/recipe-images
    to: assets/recipe-images
