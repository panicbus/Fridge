# Packaging + macOS bundle icon (Dock / Finder). Run: npm run dist:mac
appId: com.fridge.app
productName: Fridge
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/sql.js/**/*
asarUnpack:
  - node_modules/sql.js/dist/**
extraResources:
  - from: build
    to: build
  - from: assets/recipes.db
    to: assets/recipes.db
  - from: assets/recipe-images
    to: assets/recipe-images
mac:
  icon: build/icon.icns
  category: public.app-category.food-and-drink
  target:
    - dmg
    - zip
